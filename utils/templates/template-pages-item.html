<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ITEM_NAME}} - {{SITE_TITLE}}</title>
    <link rel="icon" type="image/x-icon" href="media/icons/favicon.ico">
    <link rel="stylesheet" href="../styles.css">
</head>
<body {{THEME}}>

    <nav class="navbar">
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="hamburger">&#9776;</label>
        <a href="../" class="logo-text">{{LOGO_TEXT}}</a>

        <div class="nav-links">
            {{NAV_LINKS}}
        </div>

        <input type="checkbox" id="theme-switch" />
        <label for="theme-switch">
          <!-- Icon: Moon -->
          <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <!-- Icon: Sun -->
          <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </label>
    </nav>

    <main class="container">
        <!-- Announcements (Site-wide) -->
        {{ANNOUNCEMENTS_HTML}}

        <article class="item-page">
            {{ITEM_PAGE_PATH_NAV}}
            
            <!-- Header -->
            <header class="item-header">
                <div class="item-header-main">
                    {{ITEM_LOGO}}
                    <h1 class="item-title">{{ITEM_NAME}}</h1>
                </div>
                <!-- Labels and Score on the same line -->
                {{ITEM_HEADER_META}}
            </header>

            <!-- Action Row: Links + Special Icons on the same line -->
            {{ITEM_ACTION_SECTION_HTML}}

            {{ITEM_TAGS_SECTION_HTML}}

            {{ITEM_MEDIA_HTML}}

            {{ITEM_SUMMARY_HTML}}

            <section class="item-description">
                {{ITEM_DESCRIPTION_HTML}}
            </section>

            {{ITEM_EXTRA_HTML}}

        </article>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            {{FOOTER_HTML}}
        </div>
    </footer>

</body>
</html>
